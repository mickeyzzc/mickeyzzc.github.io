<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
<defs><style>
@keyframes draw{0%{stroke-dashoffset:4000}70%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}
@keyframes fade{0%{opacity:0}100%{opacity:1}}
.p{fill:none;stroke:#2196F3;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:4000;stroke-dashoffset:4000;animation:draw 5s ease-out forwards}
.a{opacity:0;animation:fade .5s ease-out forwards}
.m{fill:#9C27B0;stroke:#fff;stroke-width:1.5;opacity:0;animation:fade .5s ease-out forwards}
.t{font-family:sans-serif;font-size:11px;font-weight:bold;fill:#333}
.s{font-family:sans-serif;font-size:10px;fill:#666}
</style></defs>
<rect width="800" height="400" fill="#f8f9fa"/>
<text x="400" y="24" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#222">TCP BBR — Model-Driven CWND Evolution (No Sawtooth)</text>
<g stroke="#e9ecef" stroke-dasharray="4,4">
<line x1="70" y1="40" x2="760" y2="40"/><line x1="70" y1="100" x2="760" y2="100"/><line x1="70" y1="160" x2="760" y2="160"/><line x1="70" y1="220" x2="760" y2="220"/><line x1="70" y1="280" x2="760" y2="280"/><line x1="70" y1="340" x2="760" y2="340"/>
<line x1="208" y1="40" x2="208" y2="340"/><line x1="346" y1="40" x2="346" y2="340"/><line x1="484" y1="40" x2="484" y2="340"/><line x1="622" y1="40" x2="622" y2="340"/><line x1="760" y1="40" x2="760" y2="340"/>
</g>
<line x1="70" y1="340" x2="760" y2="340" stroke="#444" stroke-width="1.5"/>
<line x1="70" y1="40" x2="70" y2="340" stroke="#444" stroke-width="1.5"/>
<g font-family="sans-serif" font-size="12" fill="#666" text-anchor="end">
<text x="62" y="44">100</text><text x="62" y="104">80</text><text x="62" y="164">60</text><text x="62" y="224">40</text><text x="62" y="284">20</text><text x="62" y="344">0</text>
</g>
<g font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">
<text x="70" y="365">0</text><text x="208" y="365">10</text><text x="346" y="365">20</text><text x="484" y="365">30</text><text x="622" y="365">40</text><text x="760" y="365">50</text>
</g>
<text x="400" y="385" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Time (RTTs)</text>
<text x="20" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" transform="rotate(-90,20,190)">CWND (segments)</text>
<!-- BBR path: STARTUP -> DRAIN -> PROBE_BW oscillation -> periodic PROBE_RTT dips -->
<path d="M70,337 L84,334 L98,328 L111,316 L125,322 L139,319 L167,313 L194,319 L222,316 L250,310 L264,328 L277,316 L304,310 L332,313 L360,313 L388,307 L401,328 L415,313 L443,307 L470,310 L498,310 L525,304 L553,307 L580,307 L608,301 L622,328 L636,307 L663,301 L691,304 L718,304 L732,298" class="p"/>
<!-- PROBE_RTT markers (purple, not red — these are NOT losses) -->
<circle cx="264" cy="328" r="4" class="m" style="animation-delay:3s"/>
<circle cx="401" cy="328" r="4" class="m" style="animation-delay:4s"/>
<circle cx="622" cy="328" r="4" class="m" style="animation-delay:5.5s"/>
<!-- Annot 1: STARTUP -->
<g class="a" style="animation-delay:1s">
<line x1="100" y1="295" x2="100" y2="325" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
<text x="95" y="288" class="t">STARTUP</text>
<text x="95" y="300" class="s">Exponential probe</text>
</g>
<!-- Annot 2: PROBE_BW -->
<g class="a" style="animation-delay:2.5s">
<line x1="490" y1="270" x2="340" y2="312" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
<text x="495" y="262" class="t">PROBE_BW</text>
<text x="495" y="275" class="s">Oscillate around BDP</text>
</g>
<!-- Annot 3: PROBE_RTT -->
<g class="a" style="animation-delay:3.5s">
<line x1="200" y1="335" x2="264" y2="330" stroke="#9C27B0" stroke-width="1" stroke-dasharray="3,2"/>
<text x="195" y="338" class="t" fill="#9C27B0">PROBE_RTT</text>
<text x="195" y="350" class="s">Periodic min-CWND dip</text>
</g>
</svg>
